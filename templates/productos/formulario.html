{% extends "base.html" %}
{% block titulo %}{{ 'Editar' if producto else 'Nuevo' }} Producto - ILV{% endblock %}
{% block contenido %}
<h1>{{ 'Editar' if producto else 'Nuevo' }} Producto</h1>

<form class="formulario" method="POST">
    {% if not producto %}
    <label>Código de barras</label>
    <input type="text" name="codigoBarras" maxlength="13" required>

    <label>SysTrace</label>
    <input type="text" name="sysTrace" maxlength="13" required>
    {% endif %}

    <label>Nombre</label>
    <input type="text" name="nombre" value="{{ producto.nombre if producto else '' }}" required>

    <label>Descripción</label>
    <textarea name="descripcion" rows="3">{{ producto.descripcion if producto else '' }}</textarea>

    <label>Presentación</label>
    <input type="text" name="presentacion" placeholder="Ej: 750ml" value="{{ producto.presentacion if producto else '' }}" required>

    <label>Grado alcohólico (%)</label>
    <input type="number" step="0.01" min="0" max="99.99" name="gradoAlcoholico" value="{{ producto.gradoalcoholico if producto else '' }}" required>

    <label>Precio base</label>
    <input type="number" step="0.01" min="0.01" name="precioBase" value="{{ producto.preciobase if producto else '' }}" required>

    <label>Tarifa IVA (%)</label>
    <input type="number" step="0.01" min="0" max="99.99" name="tarifaIva" value="{{ producto.tarifaiva if producto else '' }}" required>

    <label>Categoría</label>
    <select name="idCategoria" required>
        {% for cat in categorias %}
        <option value="{{ cat.idcategoria }}"
            {% if producto and producto.idcategoria == cat.idcategoria %}selected{% endif %}>
            {{ cat.nombrecategoria }}
        </option>
        {% endfor %}
    </select>

    <div class="acciones">
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a href="{{ url_for('productos.listar') }}" class="btn btn-editar">Cancelar</a>
    </div>
</form>
{% endblock %}
